<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EXPO</title>
  <style>
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
    }
    .column {
      flex: 1 1 20%; /* Adjust the percentage to control the column width */
      max-width: 20%;
      box-sizing: border-box;
      padding: 5px; /* Adjust padding as needed */
    }
    .column img {
      width: 100%;
      height: auto;
      display: block;
    }
    @media (max-width: 1200px) {
      .column {
        flex: 1 1 25%;
        max-width: 25%;
      }
    }
    @media (max-width: 768px) {
      .column {
        flex: 1 1 33.33%;
        max-width: 33.33%;
      }
    }
    @media (max-width: 480px) {
      .column {
        flex: 1 1 50%;
        max-width: 50%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="column">
